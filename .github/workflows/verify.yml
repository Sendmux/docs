name: Verify docs

# Hard gates:
# - Non-Sendmux external MDX links must be SEO-safe nofollow links.
# - Committed Postman collections must match the generated OpenAPI output.
# - Hosted Run in Postman collections must match committed Postman collections.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    name: Docs gates
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: External link safety
        run: npm run external-links:check

      - name: Postman collection drift
        run: npm run postman:check

      - name: Hosted Postman collection drift
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: npm run postman:hosted:check
